server:
  port: 8082

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: waitlist-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/waitlist/**
          filters:
            - AuthenticationFilter

        - id: doctor-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/doctor/**
          filters:
            - AuthenticationFilter

        - id: tutoria-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/tutorias/**
          filters:
            - AuthenticationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"